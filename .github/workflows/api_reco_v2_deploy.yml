name: "Deploy API Reco V2"

on:
  push:
    branches:
      - main
      - staging
      - production
    paths:
      - "apps/recommendation_v2/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - production
      no_traffic:
        description: "Deploy without routing traffic (useful to prepare A/B testing)"
        required: true
        default: true
        type: boolean

env:
  DOCKER_REGISTRY_PROJECT_ID: "passculture-infra-prod"
  DOCKER_REGISTRY_REGION: "europe-west1"
  DOCKER_REGISTRY_REPOSITORY: "pass-culture-artifact-registry"

jobs:
  setup-job:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set-variable.outputs.env_name }}
      no_traffic: ${{ steps.set-variable.outputs.no_traffic }}
    steps:
      - uses: actions/checkout@v4
      - name: "Set environment variable"
        id: "set-variable"
        env:
          REF: ${{ github.ref }}
          ENV: ${{ inputs.environment }}
          NO_TRAFFIC: ${{ inputs.no_traffic }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env_name=$ENV" | tee -a "$GITHUB_OUTPUT"
            echo "no_traffic=$NO_TRAFFIC" | tee -a "$GITHUB_OUTPUT"
          elif [ "$REF" = "refs/heads/main" ]; then
            echo "env_name=dev" | tee -a "$GITHUB_OUTPUT"
            echo "no_traffic=true" | tee -a "$GITHUB_OUTPUT"
          elif [ "$REF" = "refs/heads/staging" ]; then
            echo "env_name=staging" | tee -a "$GITHUB_OUTPUT"
            echo "no_traffic=true" | tee -a "$GITHUB_OUTPUT"
          elif [ "$REF" = "refs/heads/production" ]; then
            echo "env_name=production" | tee -a "$GITHUB_OUTPUT"
            echo "no_traffic=true" | tee -a "$GITHUB_OUTPUT"
          else
            echo "env_name=dev" | tee -a "$GITHUB_OUTPUT"
            echo "no_traffic=true" | tee -a "$GITHUB_OUTPUT"
          fi

  build-and-push-docker-image:
    name: "Build image job"
    needs: [setup-job]
    environment: ${{ needs.setup-job.outputs.env_name }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    env:
      DATA_GCP_PROJECT: ${{ vars.DATA_GCP_PROJECT }}
      ENV_SHORT_NAME: ${{ vars.ENV_SHORT_NAME }}
    steps:
      - uses: actions/checkout@v4
      - name: "Connect to Secret Manager"
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}
      - name: "Get secrets for Artifact Registry"
        id: 'secrets'
        uses: 'google-github-actions/get-secretmanager-secrets@v2'
        with:
          secrets: |-
            ARTIFACT_REGISTRY_SERVICE_ACCOUNT:passculture-metier-ehp/passculture-main-artifact-registry-service-account
            ARTIFACT_REGISTRY_WORKLOAD_IDENTITY_PROVIDER:passculture-metier-ehp/infra-prod-gcp-workload-identity-provider
      - name: "Output variables"
        id: "vars"
        run: echo "DOCKER_REPO=${DOCKER_REGISTRY_REGION}-docker.pkg.dev/${DOCKER_REGISTRY_PROJECT_ID}/${DOCKER_REGISTRY_REPOSITORY}" >> "$GITHUB_OUTPUT"
      - name: "Get short SHA"
        id: "sha"
        run: echo "short_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - id: "openid-auth"
        name: "Authenticate with Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          create_credentials_file: false
          token_format: "access_token"
          workload_identity_provider: ${{ steps.secrets.outputs.ARTIFACT_REGISTRY_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ steps.secrets.outputs.ARTIFACT_REGISTRY_SERVICE_ACCOUNT }}

      - name: "Docker login"
        uses: docker/login-action@v3
        with:
          registry: "${{ env.DOCKER_REGISTRY_REGION }}-docker.pkg.dev"
          username: "oauth2accesstoken"
          password: "${{ steps.openid-auth.outputs.access_token }}"

      - name: "Build and push docker image"
        uses: docker/build-push-action@v5
        with:
          context: apps/recommendation_v2
          push: true
          tags: |
            ${{ steps.vars.outputs.DOCKER_REPO }}/api-data/recommendation_v2:${{ steps.sha.outputs.short_sha }}
            ${{ steps.vars.outputs.DOCKER_REPO }}/api-data/recommendation_v2:latest

  deploy-api:
    runs-on: ubuntu-latest
    needs: [setup-job, build-and-push-docker-image]
    environment: ${{ needs.setup-job.outputs.env_name }}
    permissions:
      contents: 'read'
      id-token: 'write'
    env:
      DATA_GCP_PROJECT: ${{ vars.DATA_GCP_PROJECT }}
      ENV_SHORT_NAME: ${{ vars.ENV_SHORT_NAME }}
    steps:
    - uses: actions/checkout@v4
    - name: "Connect to Secret Manager"
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}
    - name: "Get secrets for Cloud Run"
      id: 'secrets'
      uses: 'google-github-actions/get-secretmanager-secrets@v2'
      with:
        secrets: |-
          ARTIFACT_REGISTRY_SERVICE_ACCOUNT:passculture-metier-ehp/passculture-main-artifact-registry-service-account
          ARTIFACT_REGISTRY_WORKLOAD_IDENTITY_PROVIDER:passculture-metier-ehp/infra-prod-gcp-workload-identity-provider
    - name: "Output variables"
      id: "vars"
      run: echo "DOCKER_REPO=${DOCKER_REGISTRY_REGION}-docker.pkg.dev/${DOCKER_REGISTRY_PROJECT_ID}/${DOCKER_REGISTRY_REPOSITORY}" >> "$GITHUB_OUTPUT"
    - name: "Get short SHA"
      id: "sha"
      run: echo "short_sha=${GITHUB_SHA}" | tee -a "$GITHUB_OUTPUT"

    - uses: 'google-github-actions/auth@v2'
      name: "Authenticate with Google Cloud for deploy"
      with:
        workload_identity_provider: ${{ steps.secrets.outputs.ARTIFACT_REGISTRY_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ steps.secrets.outputs.ARTIFACT_REGISTRY_SERVICE_ACCOUNT }}

    - id: 'deploy'
      name: 'Deploy to Cloud Run'
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: "apireco-${{ env.ENV_SHORT_NAME }}"
        image: "${{ steps.vars.outputs.DOCKER_REPO }}/api-data/recommendation_v2:${{ steps.sha.outputs.short_sha }}"
        region: "${{ env.DOCKER_REGISTRY_REGION }}"
        project_id: ${{ env.DATA_GCP_PROJECT }}
        no_traffic: ${{ needs.setup-job.outputs.no_traffic }}
        env_vars: |-
          ENV=${{ env.ENV_SHORT_NAME == 'prod' && 'production' || (env.ENV_SHORT_NAME == 'stg' && 'staging' || (env.ENV_SHORT_NAME == 'dev' && 'testing' || env.ENV_SHORT_NAME)) }}
          GCP_PROJECT=${{ env.DATA_GCP_PROJECT }}
          SQL_BASE=cloudsql-recommendation-${{ env.ENV_SHORT_NAME }}-ew1
          SQL_BASE_USER=cloudsql-recommendation-${{ env.ENV_SHORT_NAME }}-ew1
          SQL_PORT=5432
        secrets: |-
          SQL_BASE_HOST=${{ vars.GCP_SECRET_NAME_DB_HOST }}:latest
          SQL_BASE_PASSWORD=${{ vars.GCP_SECRET_NAME_DB_PASSWORD }}:latest
          API_TOKEN=${{ vars.GCP_SECRET_NAME_API_TOKEN }}:latest

  slack-notification:
    runs-on: ubuntu-latest
    environment: ${{ needs.setup-job.outputs.env_name }}
    needs: [setup-job, deploy-api]
    permissions:
      id-token: write
      contents: write
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: "Connect to Secret Manager"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ secrets.GCP_EHP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_EHP_SERVICE_ACCOUNT }}
      - name: "Get secrets for Slack"
        id: "secrets"
        uses: "google-github-actions/get-secretmanager-secrets@v2"
        with:
          secrets: |-
            SLACK_BOT_TOKEN:passculture-metier-ehp/passculture-ci-slack-bot-token
      - uses: technote-space/workflow-conclusion-action@v3
      - name: "Post to a Slack channel"
        if: always()
        uses: slackapi/slack-github-action@v1.23.0
        env:
          SLACK_BOT_TOKEN: ${{ steps.secrets.outputs.SLACK_BOT_TOKEN }}
        with:
          channel-id: "C01GVAXM02W" # alerts_data
          payload: |
            {
              "attachments": [
                {
                  "mrkdwn_in": ["text"],
                  "color": "${{ fromJSON('["#36a64f", "#A30002"]')[(env.WORKFLOW_CONCLUSION == 'failure') && 1 || 0] }}",
                  "author_name": "${{github.actor}}",
                  "author_link": "https://github.com/${{github.actor}}",
                  "author_icon": "https://github.com/${{github.actor}}.png",
                  "title": "API Reco V2 Deployment",
                  "title_link": "https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}",
                  "text": "Le déploiement de `l'API reco v2 sur ${{ needs.setup-job.outputs.env_name }}` est ${{ fromJSON('["réussi", "échoué"]')[(env.WORKFLOW_CONCLUSION == 'failure') && 1 || 0] }} ${{ fromJSON('[":muscle:", ":boom:"]')[(env.WORKFLOW_CONCLUSION == 'failure') && 1 || 0] }}"
                }
              ],
              "unfurl_links": false,
              "unfurl_media": false
            }
