name: "CI API Reco V2"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/recommendation_v2/**'
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint (Ruff)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "apps/recommendation_v2"
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set up Python 3.13"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Set up uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/recommendation_v2/uv.lock"

      - name: "Install dependencies"
        run: uv sync --locked

      - name: "Run Ruff Linter"
        run: uv run ruff check .

  type-check:
    name: "Type Check (ty)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "apps/recommendation_v2"
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set up Python 3.13"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Set up uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/recommendation_v2/uv.lock"

      - name: "Install dependencies"
        run: uv sync --locked

      - name: "Run Type Checker (ty)"
        run: uv run ty check

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "apps/recommendation_v2"
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: postgres
          POSTGRES_DB: db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set up Python 3.13"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Set up uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/recommendation_v2/uv.lock"

      - name: "Install dependencies"
        run: uv sync --locked

      - name: "Install psql client"
        run: sudo apt update && sudo apt install -y postgresql-client

      - name: "Run Unit Tests"
        env:
          ENV: "ci"
          SQL_HOST: "localhost"
          SQL_BASE: "db"
          SQL_BASE_USER: "postgres"
          SQL_PORT: "5432"
        run: make test
