name: "CI API Reco V2"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/recommendation_v2/**'
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint (Ruff)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "apps/recommendation_v2"
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set up Python 3.13"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Set up uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/recommendation_v2/uv.lock"

      - name: "Install dependencies"
        run: uv sync --locked

      - name: "Run Ruff Linter"
        run: uv run ruff check .

  type-check:
    name: "Type Check (ty)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "apps/recommendation_v2"
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set up Python 3.13"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Set up uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/recommendation_v2/uv.lock"

      - name: "Install dependencies"
        run: uv sync --locked

      - name: "Run Type Checker (ty)"
        run: uv run ty check

  marked-tests:
    name: "Verify all tests are marked"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "apps/recommendation_v2"
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set up Python 3.13"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Set up uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/recommendation_v2/uv.lock"

      - name: "Install dependencies"
        run: uv sync --locked

      - name: "Verify all tests are marked"
        env:
          ENV: "ci"
        run: make test-with-markers

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "apps/recommendation_v2"
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set up Python 3.13"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Set up uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/recommendation_v2/uv.lock"

      - name: "Install dependencies"
        run: uv sync --locked

      - name: "Run Unit Tests"
        env:
          ENV: "ci"
        run: make unit-test

  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "apps/recommendation_v2"
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set up Python 3.13"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Set up uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "apps/recommendation_v2/uv.lock"

      - name: "Install dependencies"
        run: uv sync --locked

      - name: "Run Integration Tests"
        env:
          ENV: "ci"
        run: make integration-test
