services:
  recommendation_local_db:
    image: postgis/postgis:15-3.3
    container_name: recommendation_local_db
    ports:
      - "${SQL_PORT:-5432}:5432"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 30s
      retries: 10
